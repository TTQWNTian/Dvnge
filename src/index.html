<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dvnge</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -ms-overflow-style: none;
            transition: .3s;
        }
        
        html, body {
            height: 100dvh;
            background: url('图片路径/你的背景图.png') center/cover no-repeat fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
        
        .控制组件 {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10%;
            color: #111;
            background: linear-gradient(to right, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 100%);
        }
        
        h1 {
            margin: 0 0 2em 0;
            font-size: 3em;
            font-weight: 400;
        }
        
        button {
            margin: .35em 0;
            font-size: 1.3em;
            font-weight: 300;
            color: #111;
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
        }
        
        button:hover {
            font-weight: 600;
        }
        
        /* 通用弹层样式 */
        #弹层 {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
            z-index: 200;
        }
        
        #弹层.显示 {
            opacity: 1;
            pointer-events: auto;
        }
        
        .弹层卡片 {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            padding: 30px 40px;
            border: 1px solid #DDDDDD;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        
        .弹层关闭按钮 {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #111;
        }
        
        .弹层项 {
            margin: 10px 0;
            padding: 10px 15px;
            background: #f7f7f7;
            border: 1px solid #DDDDDD;
            border-radius: 4px;
            cursor: pointer;
            transition: background .2s;
        }
        
        .弹层项:hover {
            background: #EEEEEE;
        }
        
        .弹层项.空 {
            opacity: .4;
            cursor: default;
        }
        
        .弹层项.空:hover {
            background: #f7f7f7;
        }
        
        .弹层项.当前 {
            background: #e0e0e0;
        }
        
        .隐藏 {
            display: none;
        }
        
        @media (min-width: 1028px) {
            h1 {
                font-size: 6em;
            }
            button {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="控制组件">
        <h1 id="游戏标题">Game Title</h1>
        <nav>
            <button id="开始游戏按钮" onclick="window.location.href='game.html'">开始游戏</button><br>
            <button id="读档按钮">读取存档</button><br>
            <button id="语言按钮">语言</button>
        </nav>
    </div>
    
    <!-- 通用弹层 -->
    <div id="弹层" class="隐藏">
        <div class="弹层卡片">
            <span class="弹层关闭按钮">×</span>
            <h3 id="弹层标题" style="margin-bottom: 15px;">读取存档</h3>
            <div id="弹层内容"></div>
        </div>
    </div>
    
    <script>
        let 当前界面语言 = localStorage.getItem('Dvnge_语言') || 'zh';
        
        const 界面文字 = {
            'zh': {
                '游戏标题': 'Game Title',
                '开始游戏': '开始游戏',
                '读取存档': '读取存档',
                '语言': '语言',
                '选择语言': '选择语言',
                '自动存档': '自动存档',
                '手动存档': '手动存档',
                '空存档': '空存档',
                '数据损坏': '数据损坏',
                '无数据': '无数据'
            },
            'en': {
                '游戏标题': 'Game Title',
                '开始游戏': 'Start Game',
                '读取存档': 'Load Game',
                '语言': 'Language',
                '选择语言': 'Select Language',
                '自动存档': 'Auto Save',
                '手动存档': 'Manual Save',
                '空存档': 'Empty',
                '数据损坏': 'Corrupted Data',
                '无数据': 'No Data'
            },
            'ja': {
                '游戏标题': 'Game Title',
                '开始游戏': 'ゲーム開始',
                '读取存档': 'ロード',
                '语言': '言語',
                '选择语言': '言語選択',
                '自动存档': 'オートセーブ',
                '手动存档': 'セーブ',
                '空存档': '空き',
                '数据损坏': 'データ破損',
                '无数据': 'データなし'
            }
        };
        
        function 刷新界面文字() {
            const 文字 = 界面文字[当前界面语言] || 界面文字['zh'];
            document.getElementById('游戏标题').textContent = 文字['游戏标题'];
            document.getElementById('开始游戏按钮').textContent = 文字['开始游戏'];
            document.getElementById('读档按钮').textContent = 文字['读取存档'];
            document.getElementById('语言按钮').textContent = 文字['语言'];
        }
        
        function 切换界面语言(语言代码) {
            当前界面语言 = 语言代码;
            localStorage.setItem('Dvnge_语言', 语言代码);
            刷新界面文字();
        }
        
        function 跳转到游戏(slot) {
            location.href = 'game.html?存档=' + slot;
        }
        
        function 显示读档界面() {
            const 弹层 = document.getElementById('弹层');
            const 标题 = document.getElementById('弹层标题');
            const 内容 = document.getElementById('弹层内容');
            const 文字 = 界面文字[当前界面语言] || 界面文字['zh'];
            
            标题.textContent = 文字['读取存档'];
            内容.innerHTML = '';
            
            const auto = localStorage.getItem('自动存档');
            const autoBlock = document.createElement('div');
            autoBlock.className = '弹层项';
            if (auto) {
                try {
                    const d = JSON.parse(auto);
                    autoBlock.innerHTML = `<strong>${文字['自动存档']}</strong><p style="font-size:0.8em;margin-top:5px;">${d.章节 || '未知'} · ${d.时间 || '未知'}</p>`;
                    autoBlock.onclick = () => 跳转到游戏('auto');
                } catch {
                    autoBlock.innerHTML = `<strong>${文字['自动存档']}</strong><p style="font-size:0.8em;margin-top:5px;">${文字['数据损坏']}</p>`;
                }
            } else {
                autoBlock.classList.add('空');
                autoBlock.innerHTML = `<strong>${文字['自动存档']}</strong><p style="font-size:0.8em;margin-top:5px;">${文字['无数据']}</p>`;
            }
            内容.appendChild(autoBlock);
            
            for (let i = 1; i <= 2; i++) {
                const key = `手动存档_${i}`;
                const data = localStorage.getItem(key);
                const slotBlock = document.createElement('div');
                slotBlock.className = '弹层项';
                if (data) {
                    try {
                        const d = JSON.parse(data);
                        slotBlock.innerHTML = `<strong>${文字['手动存档']} ${i}</strong><p style="font-size:0.8em;margin-top:5px;">${d.章节 || '未知'} · ${d.时间 || '未知'}</p>`;
                        slotBlock.onclick = () => 跳转到游戏(i);
                    } catch {
                        slotBlock.innerHTML = `<strong>${文字['手动存档']} ${i}</strong><p style="font-size:0.8em;margin-top:5px;">${文字['数据损坏']}</p>`;
                    }
                } else {
                    slotBlock.classList.add('空');
                    slotBlock.innerHTML = `<strong>${文字['手动存档']} ${i}</strong><p style="font-size:0.8em;margin-top:5px;">${文字['空存档']}</p>`;
                }
                内容.appendChild(slotBlock);
            }
            
            弹层.classList.add('显示');
        }
        
        function 显示语言界面() {
            const 弹层 = document.getElementById('弹层');
            const 标题 = document.getElementById('弹层标题');
            const 内容 = document.getElementById('弹层内容');
            const 文字 = 界面文字[当前界面语言] || 界面文字['zh'];
            
            标题.textContent = 文字['选择语言'];
            内容.innerHTML = '';
            
            const script = document.createElement('script');
            script.src = 'js/语言配置.js';
            script.onload = () => {
                for (const [代码, 名称] of Object.entries(语言配置.语言列表)) {
                    const 选项 = document.createElement('div');
                    选项.className = '弹层项';
                    if (代码 === 当前界面语言) {
                        选项.classList.add('当前');
                    }
                    选项.innerHTML = `<strong>${名称}</strong>`;
                    选项.onclick = () => {
                        切换界面语言(代码);
                        弹层.classList.remove('显示');
                    };
                    内容.appendChild(选项);
                }
            };
            script.onerror = () => {
                内容.innerHTML = `<div class="弹层项">${文字['语言配置加载失败'] || '语言配置加载失败'}</div>`;
            };
            document.head.appendChild(script);
            
            弹层.classList.add('显示');
        }
        
        function 关闭弹层() {
            document.getElementById('弹层').classList.remove('显示');
        }
        
        document.getElementById('读档按钮').onclick = 显示读档界面;
        document.getElementById('语言按钮').onclick = 显示语言界面;
        document.querySelector('.弹层关闭按钮').onclick = 关闭弹层;
        
        document.getElementById('弹层').onclick = (e) => {
            if (e.target === document.getElementById('弹层')) {
                关闭弹层();
            }
        };
        
        刷新界面文字();
    </script>
</body>
</html>
